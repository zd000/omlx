# oMLX venvstacks configuration
# Build portable macOS app with MLX bundled

[[runtimes]]
name = "cpython-3.11"
python_implementation = "cpython@3.11.10"
requirements = []
platforms = [
    "macosx_arm64",
]

[[frameworks]]
name = "mlx-framework"
runtime = "cpython-3.11"
requirements = [
    # Core MLX
    "mlx==0.31.1",
    # mlx-lm from latest commit (564281f) - aligned with pyproject.toml
    "mlx-lm @ git+https://github.com/ml-explore/mlx-lm@564281f",
    # mlx-embeddings from latest commit (32981fa) - aligned with pyproject.toml
    "mlx-embeddings @ git+https://github.com/Blaizzy/mlx-embeddings@32981fa4e8064ed664b52071789dd18271fe4206",
    # Server dependencies
    "fastapi>=0.100.0",
    "uvicorn>=0.23.0",
    # Tokenizers and transformers (aligned with pyproject.toml)
    # 5.4.0 broke VLM: Qwen2VLImageProcessor now hard-requires torch (#431)
    "transformers>=5.0.0,<5.4.0",
    "tokenizers>=0.19.0",
    "huggingface-hub>=0.23.0",
    # Other dependencies
    "numpy>=1.24.0",
    "tqdm>=4.66.0",
    "pyyaml>=6.0",
    "itsdangerous>=2.0",
    "jinja2>=3.0",
    "sentencepiece",
    "tiktoken",
    "protobuf",
    "requests>=2.28.0",
    # SOCKS proxy support (used by httpx via huggingface-hub)
    "socksio>=1.0.0",
    "psutil>=5.9.0",
    "jsonschema>=4.0.0",
    "tabulate>=0.9.0",
    # MCP support
    "mcp>=1.0.0",
    # Harmony format parser for gpt-oss models
    "openai-harmony",
    # mlx-vlm from commit (7f7a04c) - aligned with pyproject.toml
    "mlx-vlm @ git+https://github.com/Blaizzy/mlx-vlm@7f7a04ce20337996da335ab17cdfee0ba51d6610",
    "Pillow>=9.0.0",
    # Grammar-constrained decoding for structured output
    "xgrammar>=0.1.32",
    # ModelScope SDK for downloading models from ModelScope Hub
    "modelscope>=1.10.0",
    # python-multipart needed by audio routes (File/Form uploads)
    "python-multipart>=0.0.5",
    # NOTE: mlx-audio is built from git and installed with --no-deps in build.py
    # because mlx-audio pins mlx-lm==0.31.1 which conflicts with our git-pinned mlx-lm
]
platforms = [
    "macosx_arm64",
]
# Exclude cv2's duplicate dylibs (same libs already provided by Pillow/PIL)
dynlib_exclude = [
    "cv2/.dylibs/libavif*",
    "cv2/.dylibs/liblcms2*",
    "cv2/.dylibs/libpng16*",
    "cv2/.dylibs/libtiff*",
    "cv2/.dylibs/libfreetype*",
    "cv2/.dylibs/libharfbuzz*",
    "cv2/.dylibs/liblzma*",
    "cv2/.dylibs/libxcb*",
    "cv2/.dylibs/libXau*",
]

[[applications]]
name = "omlx-app"
launch_module = "omlx_app"
frameworks = ["mlx-framework"]
requirements = [
    # PyObjC for native macOS menubar app
    "pyobjc-core>=10.0",
    "pyobjc-framework-Cocoa>=10.0",
]
platforms = [
    "macosx_arm64",
]

[tool.uv]
exclude-newer = "2026-02-08T00:00:00Z"
environments = [
    "sys_platform == 'darwin' and platform_machine == 'arm64'",
]
